fraud_detection:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: 5432
      user: "{{ env_var('POSTGRES_USER', 'fraud_user') }}"
      pass: "{{ env_var('POSTGRES_PASSWORD', 'fraud_pass') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'fraud_detection') }}"
      schema: public
      threads: 4
